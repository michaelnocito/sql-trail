<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL Trail</title>
<meta name="description" content="An Oregon Trail homage that trains data analysts for SQL interviews.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<style>
  :root {
    --bg: #0a0a08; --fg: #33ff33; --dim: #1d8f1d; --amber: #ffb000;
    --red: #ff5544; --panel: #101410; --border: #1d8f1d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: "Courier New", ui-monospace, monospace;
    font-size: 16px; line-height: 1.45;
    text-shadow: 0 0 6px rgba(51,255,51,.35);
  }
  /* CRT scanlines */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
  }
  #app { max-width: 760px; margin: 0 auto; padding: 16px 12px 60px; }
  h1, h2 { color: var(--amber); text-shadow: 0 0 8px rgba(255,176,0,.4); margin: .4em 0; }
  h1 { font-size: 1.6em; letter-spacing: 2px; }
  .panel { border: 2px solid var(--border); background: var(--panel); padding: 12px; margin: 12px 0; }
  .dim { color: var(--dim); }
  .amber { color: var(--amber); }
  .red { color: var(--red); }
  button {
    background: var(--bg); color: var(--fg); border: 2px solid var(--fg);
    font: inherit; padding: 8px 14px; cursor: pointer; margin: 4px 4px 4px 0;
    text-shadow: inherit; min-height: 44px;
  }
  button:hover, button:focus { background: var(--fg); color: var(--bg); text-shadow: none; }
  button:disabled { border-color: var(--dim); color: var(--dim); cursor: default; }
  button:disabled:hover { background: var(--bg); color: var(--dim); }
  input[type=text], input[type=number], textarea {
    background: #000; color: var(--fg); border: 1px solid var(--dim);
    font: inherit; padding: 8px; width: 100%;
  }
  textarea { min-height: 110px; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: .92em; }
  th, td { border: 1px solid var(--dim); padding: 3px 8px; text-align: left; }
  th { color: var(--amber); }
  .statbar { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: .9em; }
  .trailmap { white-space: pre; overflow-x: auto; font-size: .85em; line-height: 1.2; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .row > div { flex: 1 1 140px; }
  .center { text-align: center; }
  .tomb { white-space: pre; font-size: .9em; line-height: 1.15; color: var(--dim); }
  label { display: block; margin: 6px 0 2px; }
  #toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 2px solid var(--amber); color: var(--amber);
    padding: 8px 16px; display: none; max-width: 90vw; }

  /* --- Query editor: industry-standard (VS Code dark) SQL coloring --- */
  .CodeMirror.cm-s-trail {
    background: #0d0d0b; color: #d4d4d4; border: 1px solid var(--dim);
    height: auto; min-height: 120px; font-family: Consolas, "Courier New", monospace;
    font-size: 15px; text-shadow: none;
  }
  .cm-s-trail .CodeMirror-lines { padding: 8px 0; }
  .cm-s-trail .CodeMirror-gutters { background: #0d0d0b; border-right: 1px solid #222; }
  .cm-s-trail .CodeMirror-linenumber { color: #555; }
  .cm-s-trail .CodeMirror-cursor { border-left: 2px solid #d4d4d4; }
  .cm-s-trail .CodeMirror-selected { background: #264f78 !important; }
  .cm-s-trail span.cm-keyword { color: #569cd6; font-weight: bold; }
  .cm-s-trail span.cm-builtin { color: #dcdcaa; }
  .cm-s-trail span.cm-string, .cm-s-trail span.cm-string-2 { color: #ce9178; }
  .cm-s-trail span.cm-number { color: #b5cea8; }
  .cm-s-trail span.cm-comment { color: #6a9955; font-style: italic; }
  .cm-s-trail span.cm-operator { color: #d4d4d4; }
  .cm-s-trail span.cm-variable, .cm-s-trail span.cm-variable-2 { color: #9cdcfe; }
  .cm-s-trail span.cm-atom { color: #569cd6; }
  .cm-s-trail span.cm-bracket { color: #ffd700; }
  .CodeMirror-hints {
    background: #1e1e1e; border: 1px solid #454545; font-family: Consolas, monospace;
    font-size: 14px; z-index: 50;
  }
  .CodeMirror-hint { color: #d4d4d4; }
  li.CodeMirror-hint-active { background: #094771; color: #fff; }

  /* --- Results pane: real query-editor output --- */
  .outtabs { display: flex; gap: 0; margin-top: 10px; }
  .outtabs button {
    min-height: 30px; padding: 3px 14px; margin: 0; font-size: .85em;
    border: 1px solid var(--dim); border-bottom: none; color: var(--dim);
  }
  .outtabs button.on { color: var(--amber); border-color: var(--amber); background: var(--bg); }
  .outpane { border: 1px solid var(--dim); padding: 8px; background: #0d0d0b;
    max-height: 300px; overflow: auto; }
  .outpane table { margin: 0; }
  .outpane .gridnum { text-align: right; color: #b5cea8; }
  .msgline { font-size: .9em; color: #cccccc; text-shadow: none; font-family: Consolas, monospace; }
  .msgline.err { color: var(--red); }

  /* --- Object Explorer: schema tree like SSMS/DBeaver --- */
  .workbench { display: flex; gap: 10px; align-items: stretch; }
  .workbench .edcol { flex: 1 1 420px; min-width: 0; }
  #objx {
    flex: 0 0 200px; background: #0d0d0b; border: 1px solid var(--dim);
    font-family: Consolas, monospace; font-size: .85em; text-shadow: none;
    color: #cccccc; padding: 6px; overflow: auto; max-height: 340px;
  }
  #objx .oxhead { color: var(--amber); border-bottom: 1px solid #222;
    padding-bottom: 4px; margin-bottom: 4px; }
  #objx details { margin: 2px 0 2px 4px; }
  #objx summary { cursor: pointer; color: #dcdcaa; }
  #objx summary::marker { color: #555; }
  #objx .oxcol { margin-left: 18px; color: #9cdcfe; white-space: nowrap; }
  #objx .oxtype { color: #666; }
  #objx .oxnew { color: var(--fg); }
  @media (max-width: 640px) {
    .workbench { flex-direction: column; }
    #objx { flex: none; max-height: 160px; }
  }
</style>
</head>
<body>
<div id="app"><p class="center dim">Loading the trail…</p></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/sql-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="js/rng.js"></script>
<script src="js/grader.js"></script>
<script src="js/engine.js"></script>
<script src="content/content.js"></script>
<script>
'use strict';
const C = TrailContent, E = TrailEngine, G = TrailGrader;
const app = document.getElementById('app');
let SQL = null;
let run = null;
let qState = null; // per-question: {idx, attempts, hintsShown, startedAt}
let editor = null;        // CodeMirror instance for the current question
let SCHEMA_HINTS = {};    // {table: [columns]} for autocomplete, built at boot

let SEED_SCHEMA = [];     // [{table, columns:[{name,type}]}] from the seed DB

// Derive autocomplete schema + Object Explorer tree from the live seed DB
// so neither ever drifts from the actual tables the player queries.
function buildSchemaHints() {
  const db = new SQL.Database();
  db.exec(TrailContent.SEED_SQL);
  SEED_SCHEMA = G.snapshotSchema(db);
  db.close();
  SCHEMA_HINTS = {};
  for (const t of SEED_SCHEMA) SCHEMA_HINTS[t.table] = t.columns.map(c => c.name);
}

// Object Explorer tree. `schema` is a snapshot; tables not in the seed are
// marked as new (the table the player just created).
function objExplorerHtml(schema) {
  const seedNames = new Set(SEED_SCHEMA.map(t => t.table));
  const tree = schema.map(t => `
    <details open>
      <summary class="${seedNames.has(t.table) ? '' : 'oxnew'}">▦ ${esc(t.table)}${seedNames.has(t.table) ? '' : ' *'}</summary>
      ${t.columns.map(c => `<div class="oxcol">${esc(c.name)} <span class="oxtype">${esc(c.type.toLowerCase())}</span></div>`).join('')}
    </details>`).join('');
  return `<div class="oxhead">▤ Object Explorer</div>${tree || '<div class="dim">no tables</div>'}`;
}

// Refresh the explorer (and autocomplete) after a statement runs, so a
// CREATE TABLE shows up immediately — like hitting refresh in SSMS.
function refreshExplorer(schema) {
  if (!schema) return;
  const el = document.getElementById('objx');
  if (el) el.innerHTML = objExplorerHtml(schema);
  const hints = {};
  for (const t of schema) hints[t.table] = t.columns.map(c => c.name);
  if (editor) editor.setOption('hintOptions', { tables: hints, completeSingle: false });
}

// Mount a CodeMirror SQL editor with schema-aware autocomplete.
function mountEditor(hostId) {
  const host = document.getElementById(hostId);
  editor = CodeMirror(host, {
    mode: 'text/x-sql',
    theme: 'trail',
    lineNumbers: true,
    lineWrapping: true,          // long queries wrap — no ugly native h-scrollbar
    scrollbarStyle: 'null',
    matchBrackets: true,
    autoCloseBrackets: true,
    autofocus: true,
    viewportMargin: Infinity,
    extraKeys: {
      'Ctrl-Space': 'autocomplete',
      'Ctrl-Enter': () => submitAnswer(),
      'Cmd-Enter': () => submitAnswer(),
    },
    hintOptions: { tables: SCHEMA_HINTS, completeSingle: false },
  });
  // Auto-open completions while typing identifiers or after a dot,
  // like a desktop SQL editor's IntelliSense.
  editor.on('inputRead', (cm, change) => {
    if (cm.state.completionActive) return;
    const ch = change.text[change.text.length - 1];
    if (/[A-Za-z_.]/.test(ch)) cm.showHint({ completeSingle: false });
  });
}

const HIST_KEY = 'sql-trail-history-v1';

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 3200);
}

function statbar() {
  const br = E.burnRate(run);
  return `<div class="panel statbar">
    <span>Day <b>${run.day}</b></span>
    <span>Food <b>${run.food}</b> lbs</span>
    <span>Parts <b>${run.parts}</b></span>
    <span>Meds <b>${run.medicine}</b></span>
    <span>$<b>${run.money}</b></span>
    <span>Morale <b>${run.morale}</b></span>
    <span class="dim">Food lasts ~${br.legsOfFood} legs</span>
  </div>
  <div class="panel statbar">${run.party.map(m =>
    m.alive ? `<span>${esc(m.name)} <b>${m.health}</b></span>`
            : `<span class="red">${esc(m.name)} ✝</span>`).join('')}
  </div>`;
}

function trailMap() {
  let line = '', labels = '';
  C.STOPS.forEach((s, i) => {
    const here = run && run.stop === i + 1;
    const passed = run && run.stop > i + 1;
    line += (passed ? '══' : '──') + (here ? '[◆]' : passed ? '[■]' : '[ ]');
  });
  return `<div class="panel trailmap">START ${line}══► OREGON\n<span class="dim">stop ${run ? Math.min(run.stop, 9) : 0} of 9 — ${run && run.stop >= 1 && run.stop <= 9 ? esc(C.STOPS[run.stop - 1].name) : 'the outfitter'}</span></div>`;
}

// ---------- screens ----------

function screenTitle() {
  app.innerHTML = `
    <h1 class="center">S Q L &nbsp; T R A I L</h1>
    <p class="center dim">You have died of a Cartesian product.<br>…not yet, anyway.</p>
    <div class="panel">
      <p>Travel the trail. At every rest stop, interview-grade SQL decides whether your party eats.</p>
      <p class="dim">v${C.GAME_VERSION} — fixed trail, fixed questions, seeded events. Beat your own last run.</p>
    </div>
    <div class="center">
      <button onclick="screenOutfit()">Head west</button>
      <button onclick="screenHistory()">Journey records</button>
    </div>`;
}

function screenOutfit() {
  app.innerHTML = `
    <h2>Independence, MO — The Outfitter</h2>
    <div class="panel">
      <p>Name your party of four.</p>
      <div class="row">
        <div><label>Leader</label><input type="text" id="p0" value="You" maxlength="12"></div>
        <div><label>Member 2</label><input type="text" id="p1" value="Ada" maxlength="12"></div>
        <div><label>Member 3</label><input type="text" id="p2" value="Edgar" maxlength="12"></div>
        <div><label>Member 4</label><input type="text" id="p3" value="Codd" maxlength="12"></div>
      </div>
    </div>
    <div class="panel">
      <p>You have <b class="amber">$${E.START.money}</b>. Allocate your budget — an analyst plans from data.
      <span class="dim">(Food $${E.PRICES.food}/lb · Parts $${E.PRICES.parts} each · Medicine $${E.PRICES.medicine} each. Unspent money stays cash for hints and forts.)</span></p>
      <div class="row">
        <div><label>$ Food</label><input type="number" id="aFood" value="100" min="0" max="160"></div>
        <div><label>$ Parts</label><input type="number" id="aParts" value="40" min="0" max="160"></div>
        <div><label>$ Medicine</label><input type="number" id="aMeds" value="12" min="0" max="160"></div>
      </div>
      <p id="allocSum" class="dim"></p>
    </div>
    <div class="center"><button onclick="startRun()">Hitch the oxen</button></div>`;
  const upd = () => {
    const s = ['aFood','aParts','aMeds'].reduce((t, id) => t + (+document.getElementById(id).value || 0), 0);
    const el = document.getElementById('allocSum');
    el.textContent = `Spending $${s} of $${E.START.money} — $${E.START.money - s} kept as cash`;
    el.className = s > E.START.money ? 'red' : 'dim';
  };
  ['aFood','aParts','aMeds'].forEach(id => document.getElementById(id).oninput = upd);
  upd();
}

function startRun() {
  const names = [0,1,2,3].map(i => document.getElementById('p' + i).value.trim() || 'Pioneer');
  const alloc = {
    food: +document.getElementById('aFood').value || 0,
    parts: +document.getElementById('aParts').value || 0,
    medicine: +document.getElementById('aMeds').value || 0,
  };
  try { run = E.newRun(C, names, alloc); }
  catch (e) { toast(e.message); return; }
  run.startedAt = Date.now();
  screenTravel();
}

function screenTravel() {
  const next = C.STOPS[run.stop]; // stop index === next stop (0-based)
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>On the trail — toward ${esc(next.name)}</h2>
    <div class="panel">
      <div class="row">
        <div><label>Pace</label>${sel('pace', Object.keys(E.PACE), run.pace)}</div>
        <div><label>Rations</label>${sel('rations', Object.keys(E.RATIONS), run.rations)}</div>
      </div>
    </div>
    <div class="center"><button onclick="doTravel()">Continue on trail</button></div>
    ${logPanel()}`;
  function sel(key, opts, cur) {
    return opts.map(o =>
      `<button style="min-width:110px;${o===cur?'background:var(--fg);color:var(--bg);text-shadow:none;':''}" onclick="run.${key}='${o}';screenTravel()">${o}</button>`).join('');
  }
}

function logPanel() {
  if (!run.log.length) return '';
  return `<div class="panel"><b class="amber">Trail log</b>${run.log.slice(-6).map(l =>
    `<div class="dim">Day ${l.day}: ${esc(l.text)}</div>`).join('')}</div>`;
}

function doTravel() {
  E.travelLeg(run);
  if (run.dead) return screenTombstone();
  if (run.stop > 3) return screenReport(true); // Phase 1 gray-box ends after stop 3
  startStop();
}

function startStop() {
  qState = { idx: 0, attempts: 0, hintsShown: 0, startedAt: Date.now(), correctCount: 0 };
  screenQuestion();
}

function screenQuestion() {
  const stop = C.STOPS[run.stop - 1];
  const q = stop.questions[qState.idx];
  // Hints 1-2 are nudges; hint 3 is the full answer, ready to copy or paste.
  const hints = q.hints.slice(0, Math.min(qState.hintsShown, 2)).map((h, i) =>
    `<div class="dim">Hint ${i + 1}: ${esc(h)}</div>`).join('')
    + (qState.hintsShown >= 3 ? `
      <div class="dim">Hint 3 — the full answer:</div>
      <div style="border:1px solid var(--dim);background:#0d0d0b;padding:8px;font-family:Consolas,monospace;text-shadow:none;color:#d4d4d4">${esc(q.answer)}</div>
      <button style="min-height:34px;padding:4px 12px" onclick="copyAnswer()">Copy</button>
      <button style="min-height:34px;padding:4px 12px" onclick="pasteAnswer()">Paste into editor</button>` : '');
  const nextHintCost = E.hintCost(qState.hintsShown);
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>${esc(stop.name)} — ${esc(stop.concept)}</h2>
    ${qState.idx === 0 && stop.intro ? `<p class="dim">${esc(stop.intro)}</p>` : ''}
    <div class="panel">
      <b class="amber">Question ${qState.idx + 1} of ${stop.questions.length}</b>
      <p>${esc(q.prompt)}</p>
      ${hints}
      <label>Query editor <span class="dim">(Ctrl+Space = autocomplete · Ctrl+Enter = run)</span></label>
      <div class="workbench">
        <div class="edcol"><div id="sqlHost"></div></div>
        <div id="objx">${objExplorerHtml(SEED_SCHEMA)}</div>
      </div>
      <div>
        <button onclick="submitAnswer()">▶ Execute</button>
        <button onclick="takeHint()" ${qState.hintsShown >= 3 ? 'disabled' : ''}>
          ${qState.hintsShown >= 2 ? 'Show answer' : `Hint ${qState.hintsShown + 1}`}${nextHintCost ? ` (−${nextHintCost} lbs food)` : ' (free)'}
        </button>
        <button onclick="skipQuestion()">Give up (−health)</button>
      </div>
      <div id="result"></div>
    </div>
    <div class="panel dim"><b class="amber">Trail Guide</b> — ${esc(guideBlurb(stop.concept))}
      <div>Study more: <a style="color:var(--amber)" href="https://michaelnocito.github.io/analyst-prep-kit/" target="_blank" rel="noopener">Analyst Prep Kit</a></div></div>`;
  mountEditor('sqlHost');
}

function guideBlurb(concept) {
  const g = {
    'SELECT fundamentals': 'SELECT chooses columns; DISTINCT removes duplicates; you can compute new columns with arithmetic and AS.',
    'WHERE / ORDER BY': 'WHERE filters rows (=, <, >, AND, IN); ORDER BY sorts the result, ASC or DESC.',
    'Aggregates + GROUP BY / HAVING': 'COUNT/SUM/AVG collapse many rows into one; GROUP BY makes one row per group; HAVING filters the groups.',
  };
  return g[concept] || concept;
}

function currentAnswer() {
  return C.STOPS[run.stop - 1].questions[qState.idx].answer;
}
function copyAnswer() {
  navigator.clipboard.writeText(currentAnswer())
    .then(() => toast('Answer copied.'))
    .catch(() => toast('Copy blocked — use Paste into editor instead.'));
}
function pasteAnswer() {
  if (editor) { editor.setValue(currentAnswer()); editor.focus(); }
}

function takeHint() {
  const cost = E.hintCost(qState.hintsShown);
  if (cost > 0 && run.food < cost) return toast('Not enough food for that hint.');
  run.food -= cost;
  qState.hintsShown++;
  screenQuestion();
}

function submitAnswer() {
  const stop = C.STOPS[run.stop - 1];
  const q = stop.questions[qState.idx];
  const sqlText = editor ? editor.getValue() : '';
  qState.attempts++;
  const t0 = performance.now();
  const r = G.grade(SQL, C.SEED_SQL, q, sqlText);
  const execMs = Math.max(1, Math.round(performance.now() - t0));
  const out = document.getElementById('result');
  refreshExplorer(r.schemaAfter);

  if (r.tier === 'fail' && (r.reason === 'rejected' || r.reason === 'sql-error')) {
    // Free retry on syntax/sandbox errors — the trail punishes wrong answers, not typos.
    out.innerHTML = queryOutput(r, q, execMs, null);
    return;
  }

  const timeMs = Date.now() - qState.startedAt;
  if (r.tier === 'full' || r.tier === 'partial') {
    const reward = E.recordAnswer(run, stop.id, r, qState.attempts, qState.hintsShown, timeMs);
    if (r.tier === 'full') qState.correctCount++;
    out.innerHTML = `
      ${queryOutput(r, q, execMs, null)}
      ${r.tier === 'full'
        ? `<p class="amber">Correct. You gathered ${reward} lbs of supplies.</p>`
        : `<p class="amber">Partial credit (${Math.round(r.overlap * 100)}% of rows). You gathered ${reward} lbs but could only carry half.</p>`}
      <button onclick="nextQuestion()">Continue</button>`;
  } else {
    E.recordAnswer(run, stop.id, r, qState.attempts, qState.hintsShown, timeMs);
    out.innerHTML = `
      ${queryOutput(r, q, execMs, null)}
      <p class="red">The query ran, but the rows are wrong. The party goes a little hungrier.</p>
      <button onclick="screenQuestion()">Try again</button>
      <button onclick="nextQuestion()">Move on</button>`;
  }
  if (run.dead) screenTombstone();
}

// Real-world query editor output: Results grid + Messages tab.
function queryOutput(r, q, execMs) {
  const isWrite = q.type === 'write';
  const messages = [];
  if (r.reason === 'rejected' || r.reason === 'sql-error') {
    messages.push(`<div class="msgline err">Error: ${esc(r.error || 'query failed')}</div>`);
  } else if (isWrite) {
    messages.push(r.rowsAffected > 0
      ? `<div class="msgline">(${r.rowsAffected} row${r.rowsAffected === 1 ? '' : 's'} affected)</div>`
      : `<div class="msgline">Commands completed successfully.</div>`);
    messages.push(`<div class="msgline">Completion time: ${execMs} ms</div>`);
  } else {
    const n = r.playerRes ? r.playerRes.values.length : 0;
    messages.push(`<div class="msgline">(${n} row${n === 1 ? '' : 's'} returned in ${execMs} ms)</div>`);
  }
  const hasGrid = r.playerRes && r.playerRes.columns.length;
  const gridLabel = isWrite && hasGrid ? '<div class="dim" style="margin-bottom:4px">Table state after your statement:</div>' : '';
  const results = hasGrid ? gridLabel + renderRows(r.playerRes) : '<div class="msgline dim">No result set.</div>';
  const startTab = (r.reason === 'rejected' || r.reason === 'sql-error') ? 'msg' : 'res';
  const uid = 'out' + Date.now();
  return `
    <div class="outtabs">
      <button id="${uid}-tres" class="${startTab === 'res' ? 'on' : ''}" onclick="showOutTab('${uid}','res')">Results</button>
      <button id="${uid}-tmsg" class="${startTab === 'msg' ? 'on' : ''}" onclick="showOutTab('${uid}','msg')">Messages</button>
    </div>
    <div id="${uid}-res" class="outpane" style="display:${startTab === 'res' ? 'block' : 'none'}">${results}</div>
    <div id="${uid}-msg" class="outpane" style="display:${startTab === 'msg' ? 'block' : 'none'}">${messages.join('')}</div>`;
}

function showOutTab(uid, tab) {
  for (const t of ['res', 'msg']) {
    document.getElementById(`${uid}-${t}`).style.display = t === tab ? 'block' : 'none';
    document.getElementById(`${uid}-t${t}`).classList.toggle('on', t === tab);
  }
}

function skipQuestion() {
  const stop = C.STOPS[run.stop - 1];
  E.recordAnswer(run, stop.id, { tier: 'fail' }, qState.attempts + 1, qState.hintsShown, Date.now() - qState.startedAt);
  run.party.forEach(m => { if (m.alive) m.health -= 5; });
  nextQuestion();
}

function renderRows(res) {
  if (!res || !res.columns.length) return '<p class="dim">(no rows returned)</p>';
  const head = '<tr><th class="dim">#</th>' + res.columns.map(c => `<th>${esc(c)}</th>`).join('') + '</tr>';
  const body = res.values.slice(0, 50).map((r, i) =>
    `<tr><td class="dim gridnum">${i + 1}</td>` + r.map(v =>
      v === null ? '<td><span class="dim">NULL</span></td>'
      : typeof v === 'number' ? `<td class="gridnum">${esc(v)}</td>`
      : `<td>${esc(v)}</td>`).join('') + '</tr>').join('');
  const more = res.values.length > 50 ? `<p class="dim">…${res.values.length - 50} more rows</p>` : '';
  return `<table>${head}${body}</table>${more}`;
}

function nextQuestion() {
  const stop = C.STOPS[run.stop - 1];
  qState.idx++;
  if (qState.idx >= stop.questions.length) {
    // Stop failure = under half full-credit answers (GDD §5: move on weakened).
    if (qState.correctCount < Math.ceil(stop.questions.length / 2)) {
      E.failStop(run);
      toast('A rough stop. The party moves on weakened.');
    }
    if (run.dead) return screenTombstone();
    screenTravel();
  } else {
    qState.attempts = 0; qState.hintsShown = 0; qState.startedAt = Date.now();
    screenQuestion();
  }
}

function screenTombstone() {
  const rand = TrailRNG.fromVersion(C.GAME_VERSION + ':' + run.day);
  const epitaph = C.EPITAPHS[Math.floor(rand() * C.EPITAPHS.length)];
  saveHistory(false);
  app.innerHTML = `
    <h2 class="center red">The whole party has died.</h2>
    <div class="panel tomb center">      _______
     /       \\
    |  R.I.P  |
    |         |
    | ${esc(run.party[0].name).padEnd(8)}|
    |  &amp; co.  |
    |_________|
   Here lies a party that
   ${esc(epitaph)}
   Day ${run.day} · v${C.GAME_VERSION}</div>
    <div class="center">
      <button onclick="screenOutfit()">Start a new run</button>
      <button onclick="screenReport(false)">Journey Report</button>
    </div>`;
}

function screenReport(finished) {
  if (finished) saveHistory(true);
  const m = run.metrics;
  const mins = Math.round((Date.now() - run.startedAt) / 6000) / 10;
  const rows = m.perStop.map(s => {
    const stop = C.STOPS[s.stop - 1];
    return `<tr><td>${s.stop}. ${esc(stop.name)}</td><td>${esc(stop.concept)}</td>
      <td>${s.correct}/${stop.questions.length}</td><td>${s.partial}</td><td>${s.hints}</td>
      <td>${Math.round(s.timeMs / 1000)}s</td></tr>`;
  }).join('');
  const hist = loadHistory();
  const prev = hist.length > 1 ? hist[hist.length - 2] : null;
  app.innerHTML = `
    <h2>${finished ? 'Gray-box complete — Journey Report' : 'Journey Report'}</h2>
    <div class="panel">
      <div class="statbar">
        <span>Time <b>${mins}</b> min</span><span>Days <b>${run.day}</b></span>
        <span>Score <b>${m.score}</b></span><span>Hints <b>${m.hints}</b></span>
        <span>Deaths <b>${m.deaths}</b></span>
      </div>
      <table><tr><th>Stop</th><th>Concept</th><th>Full</th><th>Partial</th><th>Hints</th><th>Time</th></tr>${rows}</table>
      ${prev ? `<p class="dim">Last run: score ${prev.score}, ${prev.mins} min — ${m.score > prev.score ? '<span class="amber">you beat it.</span>' : 'beat it next time.'}</p>` : '<p class="dim">First recorded run. This is your baseline.</p>'}
      <p class="dim">Phase 1 gray-box covers stops 1-3. Stops 4-9 and the full Journey Report land in later phases.</p>
    </div>
    <div class="center">
      <button onclick="screenOutfit()">Run it again</button>
      <button onclick="screenTitle()">Title</button>
    </div>`;
}

function saveHistory(finished) {
  const hist = loadHistory();
  hist.push({ v: run.version, score: run.metrics.score, days: run.day,
    mins: Math.round((Date.now() - run.startedAt) / 6000) / 10,
    hints: run.metrics.hints, deaths: run.metrics.deaths, finished, at: Date.now() });
  localStorage.setItem(HIST_KEY, JSON.stringify(hist.slice(-50)));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; }
}

function screenHistory() {
  const hist = loadHistory().slice().reverse();
  app.innerHTML = `
    <h2>Journey records</h2>
    <div class="panel">${hist.length ? `<table>
      <tr><th>When</th><th>Score</th><th>Days</th><th>Min</th><th>Hints</th><th>Fate</th></tr>
      ${hist.map(h => `<tr><td>${new Date(h.at).toLocaleDateString()}</td><td>${h.score}</td>
        <td>${h.days}</td><td>${h.mins}</td><td>${h.hints}</td>
        <td>${h.finished ? 'arrived' : '<span class="red">✝</span>'}</td></tr>`).join('')}
      </table>` : '<p class="dim">No runs yet. The trail keeps the books; you just have to walk it.</p>'}
    </div>
    <div class="center"><button onclick="screenTitle()">Back</button></div>`;
}

// ---------- boot ----------
(async () => {
  SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
  buildSchemaHints();
  screenTitle();
})();
</script>
</body>
</html>
