<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL Trail</title>
<meta name="description" content="An Oregon Trail homage that trains data analysts for SQL interviews.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<style>
  /* ============================================================
     Hybrid retro-modern (Batch: modernize). Chrome is modern —
     warm paper white + dusty brown, readable type, clear button
     hierarchy. The ORIGINAL green-CRT look survives as callouts:
     .crt panels (trail map, vignettes, tombstone, hint answers)
     keep the phosphor-green-on-black + scanlines as deliberate
     nods to the Apple II original.
     ============================================================ */
  :root {
    --paper: #f6f1e6;          /* modern warm white */
    --card: #fffcf5;
    --ink: #3a2f22;            /* dusty dark brown text */
    --muted: #8a7a63;          /* secondary text */
    --brown: #8b6f4e;          /* dusty brown borders/UI */
    --brown-dark: #5b4632;     /* primary buttons / headings */
    --accent: #b0562c;         /* rust — highlights, links, warnings-lite */
    --red: #a8322a;
    --gold: #f3e8cf;           /* soft highlight fill */
    /* retro callout palette (the original's CRT) */
    --crt-bg: #0b100b; --crt-fg: #33ff33; --crt-dim: #1d8f1d; --crt-amber: #ffb000;
    /* aliases kept so existing markup restyles itself */
    --dim: var(--muted); --amber: var(--accent); --panel: var(--card); --border: var(--brown);
    --bg: var(--paper); --fg: var(--ink);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    background-image: radial-gradient(ellipse at top, #fbf7ee 0%, var(--paper) 60%);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 16px; line-height: 1.5;
  }
  #app { max-width: 760px; margin: 0 auto; padding: 16px 12px 60px; }
  h1, h2 { color: var(--brown-dark); font-family: Georgia, "Times New Roman", serif; margin: .4em 0; }
  h1 { font-size: 1.7em; letter-spacing: 2px; }
  h2 { font-size: 1.25em; border-bottom: 2px solid var(--brown); padding-bottom: 4px; }
  .panel {
    border: 1px solid #d8cbb4; background: var(--card); padding: 14px;
    margin: 12px 0; border-radius: 8px; box-shadow: 0 1px 3px rgba(90,70,50,.12);
  }
  .dim { color: var(--muted); }
  .amber { color: var(--accent); font-weight: 600; }
  .red { color: var(--red); font-weight: 600; }
  a { color: var(--accent); }
  button {
    background: var(--card); color: var(--brown-dark); border: 1.5px solid var(--brown);
    font: inherit; font-weight: 600; padding: 8px 16px; cursor: pointer;
    margin: 4px 4px 4px 0; min-height: 44px; border-radius: 6px;
    transition: background .12s, transform .06s, box-shadow .12s;
  }
  button:hover, button:focus-visible { background: var(--gold); box-shadow: 0 1px 4px rgba(90,70,50,.2); }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--brown-dark); color: #fff8ec; border-color: var(--brown-dark); }
  button.primary:hover, button.primary:focus-visible { background: #6f5740; }
  button:disabled { border-color: #d8cbb4; color: #b7a88f; background: var(--card); cursor: default; box-shadow: none; }
  input[type=text], input[type=number], textarea {
    background: #fff; color: var(--ink); border: 1.5px solid #cbbb9e;
    font: inherit; padding: 8px 10px; width: 100%; border-radius: 6px;
  }
  input:focus-visible, textarea:focus-visible { outline: 2px solid var(--brown); outline-offset: 1px; }
  textarea { min-height: 110px; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: .92em; }
  th, td { border: 1px solid #ddd0ba; padding: 4px 8px; text-align: left; }
  th { color: var(--brown-dark); background: var(--gold); }
  tr:nth-child(even) td { background: #faf5ea; }
  /* modern stat chips */
  .statbar { display: flex; flex-wrap: wrap; gap: 6px; font-size: .88em; }
  .statbar > span {
    background: var(--gold); border: 1px solid #e2d5bc; border-radius: 999px;
    padding: 3px 10px; white-space: nowrap;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .row > div { flex: 1 1 140px; }
  .center { text-align: center; }
  label { display: block; margin: 6px 0 2px; font-weight: 600; font-size: .92em; }
  #toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: var(--brown-dark); border: none; color: #fff8ec; border-radius: 8px;
    padding: 10px 18px; display: none; max-width: 90vw; box-shadow: 0 3px 10px rgba(0,0,0,.3); }

  /* --- Retro CRT callouts: the original game lives in these insets --- */
  .crt {
    position: relative; background: var(--crt-bg); color: var(--crt-fg);
    border: 2px solid #2c2c24; border-radius: 8px; padding: 12px;
    font-family: "Courier New", ui-monospace, monospace;
    text-shadow: 0 0 6px rgba(51,255,51,.35); overflow: hidden;
  }
  .crt::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.2) 0 1px, transparent 1px 3px);
    border-radius: 6px;
  }
  .crt .dim { color: var(--crt-dim); }
  .crt .amber, .crt b { color: var(--crt-amber); font-weight: 600; }
  .trailmap { white-space: pre; overflow-x: auto; font-size: .85em; line-height: 1.2; }
  .tomb { white-space: pre; font-size: .9em; line-height: 1.15; color: var(--crt-fg); }

  /* --- Orientation aids: the player always knows what to do --- */
  .objective {
    background: var(--gold); border-left: 4px solid var(--accent); border-radius: 6px;
    padding: 10px 12px; margin: 8px 0; font-size: 1.02em;
  }
  .objective .tag { color: var(--accent); font-weight: 700; font-size: .8em;
    text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px; }
  .qdots { display: inline-flex; gap: 5px; vertical-align: middle; margin-left: 8px; }
  .qdots i { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--brown); background: transparent; }
  .qdots i.done { background: var(--brown); }
  .qdots i.now { background: var(--accent); border-color: var(--accent); }
  .nextstep { color: var(--muted); font-size: .92em; margin: 4px 0 10px; }
  /* stat chips inside a CRT callout go phosphor, not gold */
  .crt .statbar > span { background: transparent; border-color: #234223; color: var(--crt-fg); }
  /* dark "pro tool" panes share the modern radius */
  .outpane, .buildpad, .schemastrip, .CodeMirror.cm-s-trail { border-radius: 6px; }

  /* --- Query editor: industry-standard (VS Code dark) SQL coloring --- */
  .CodeMirror.cm-s-trail {
    background: #0d0d0b; color: #d4d4d4; border: 1px solid var(--dim);
    height: auto; min-height: 140px; font-family: Consolas, "Courier New", monospace;
    font-size: 15px; text-shadow: none;
  }
  .cm-s-trail .CodeMirror-lines { padding: 8px 0; }
  .cm-s-trail .CodeMirror-gutters { background: #0d0d0b; border-right: 1px solid #222; }
  .cm-s-trail .CodeMirror-linenumber { color: #555; }
  .cm-s-trail .CodeMirror-cursor { border-left: 2px solid #d4d4d4; }
  .cm-s-trail .CodeMirror-selected { background: #264f78 !important; }
  .cm-s-trail span.cm-keyword { color: #569cd6; font-weight: bold; }
  .cm-s-trail span.cm-builtin { color: #dcdcaa; }
  .cm-s-trail span.cm-string, .cm-s-trail span.cm-string-2 { color: #ce9178; }
  .cm-s-trail span.cm-number { color: #b5cea8; }
  .cm-s-trail span.cm-comment { color: #6a9955; font-style: italic; }
  .cm-s-trail span.cm-operator { color: #d4d4d4; }
  .cm-s-trail span.cm-variable, .cm-s-trail span.cm-variable-2 { color: #9cdcfe; }
  .cm-s-trail span.cm-atom { color: #569cd6; }
  .cm-s-trail span.cm-bracket { color: #ffd700; }
  .CodeMirror-hints {
    background: #1e1e1e; border: 1px solid #454545; font-family: Consolas, monospace;
    font-size: 14px; z-index: 50;
  }
  .CodeMirror-hint { color: #d4d4d4; }
  li.CodeMirror-hint-active { background: #094771; color: #fff; }

  /* --- Results pane: real query-editor output --- */
  .outtabs { display: flex; gap: 0; margin-top: 10px; }
  .outtabs button {
    min-height: 30px; padding: 3px 14px; margin: 0; font-size: .85em;
    border: 1px solid var(--dim); border-bottom: none; color: var(--dim);
  }
  .outtabs button.on { color: var(--amber); border-color: var(--amber); background: var(--bg); }
  .outpane { border: 1px solid var(--dim); padding: 8px; background: #0d0d0b;
    max-height: 300px; overflow: auto; }
  .outpane table { margin: 0; }
  .outpane .gridnum { text-align: right; color: #b5cea8; }
  .msgline { font-size: .9em; color: #cccccc; text-shadow: none; font-family: Consolas, monospace; }
  .msgline.err { color: var(--red); }

  /* --- Tap-token query builder (Batch 2): Build tab beside typing --- */
  .modetabs { display: flex; gap: 0; margin-top: 4px; }
  .modetabs button {
    min-height: 30px; padding: 3px 14px; margin: 0; font-size: .85em;
    border: 1px solid var(--dim); border-bottom: none; color: var(--dim);
  }
  .modetabs button.on { color: var(--amber); border-color: var(--amber); background: var(--bg); }
  .buildpad {
    border: 1px solid var(--dim); background: #0d0d0b; padding: 6px 8px;
    margin-top: 6px; text-shadow: none; font-family: Consolas, monospace;
  }
  .buildpad .blabel { color: #6a9955; font-size: .72em; font-style: italic; }
  .buildpad .bgroup { margin: 3px 0; }
  .buildpad button.tok {
    min-height: 36px; padding: 4px 10px; margin: 2px 3px 2px 0; font-size: .85em;
    font-family: Consolas, monospace; border: 1px solid #454545;
    background: #1e1e1e; color: #d4d4d4; text-shadow: none;
  }
  .buildpad button.tok:hover, .buildpad button.tok:focus { background: #094771; color: #fff; }
  .buildpad button.tok.kw { color: #569cd6; font-weight: bold; }
  .buildpad button.tok.fn { color: #dcdcaa; }
  .buildpad button.tok.tb { color: #dcdcaa; }
  .buildpad button.tok.col { color: #9cdcfe; }
  .buildpad button.tok.val { color: #ce9178; }
  .buildpad button.tok.ctl { color: var(--amber); border-color: var(--amber); }

  /* --- Schema strip: just the tables this question needs --- */
  .schemastrip {
    background: #0d0d0b; border: 1px solid var(--dim); margin-top: 6px;
    padding: 6px 8px; font-family: Consolas, monospace; font-size: .85em;
    text-shadow: none; color: #cccccc;
  }
  .schemastrip .sstable { color: #dcdcaa; }
  .schemastrip .sscols { color: #9cdcfe; }
  .schemastrip div { margin: 2px 0; }
  @media (max-width: 640px) {
    .CodeMirror.cm-s-trail { min-height: 110px; }
    #app { padding: 8px 8px 30px; }
    body { font-size: 14px; }
    .panel { padding: 8px; margin: 8px 0; }
    .outpane { max-height: 220px; }
  }

  /* Slim dark scrollbars everywhere inside the game panes */
  .outpane, .trailmap { scrollbar-width: thin; scrollbar-color: #333 #0d0d0b; }
  .outpane::-webkit-scrollbar, .trailmap::-webkit-scrollbar { width: 8px; height: 8px; }
  .outpane::-webkit-scrollbar-track, .trailmap::-webkit-scrollbar-track { background: #0d0d0b; }
  .outpane::-webkit-scrollbar-thumb, .trailmap::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  /* CodeMirror wraps lines; kill its native scrollbar chrome entirely */
  .CodeMirror-hscrollbar, .CodeMirror-vscrollbar, .CodeMirror-scrollbar-filler { display: none !important; }
</style>
</head>
<body>
<div id="app"><p class="center dim">Loading the trail…</p></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/sql-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script>
// BUILD stamps the local script URLs so index.html and its JS can never be
// cached out of sync. Bump together with version.json on every deploy.
const BUILD = 17;
['js/rng.js', 'js/grader.js', 'js/builder.js', 'js/engine.js', 'content/content.js'].forEach(s =>
  document.write(`<script src="${s}?v=${BUILD}"><\/script>`));
</script>
<script>
'use strict';
const C = TrailContent, E = TrailEngine, G = TrailGrader;

// GH Pages caches for 10 min; browsers hold old tabs longer. Compare the
// running build against the deployed one (fetched uncached) and reload once
// if stale, so nobody ever playtests an old version again.
async function checkForUpdate() {
  try {
    const res = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
    const v = await res.json();
    if (v.build > BUILD) {
      if (run && !run.dead) { toast('A new build shipped — refresh after this run.'); return; }
      if (!sessionStorage.getItem('trail-reloaded-' + v.build)) {
        sessionStorage.setItem('trail-reloaded-' + v.build, '1');
        location.reload();
      }
    }
  } catch { /* offline or file:// — ignore */ }
}
const app = document.getElementById('app');
let SQL = null;
let run = null;
let qState = null; // per-question: {idx, attempts, hintsShown, startedAt}
let editor = null;        // CodeMirror instance for the current question
let SCHEMA_HINTS = {};    // {table: [columns]} for autocomplete, built at boot

let SEED_SCHEMA = [];     // [{table, columns:[{name,type}]}] from the seed DB

// Derive autocomplete schema + Object Explorer tree from the live seed DB
// so neither ever drifts from the actual tables the player queries.
function buildSchemaHints() {
  const db = new SQL.Database();
  db.exec(TrailContent.SEED_SQL);
  SEED_SCHEMA = G.snapshotSchema(db);
  db.close();
  SCHEMA_HINTS = {};
  for (const t of SEED_SCHEMA) SCHEMA_HINTS[t.table] = t.columns.map(c => c.name);
}

// Which tables does this question actually involve? Parse the canonical
// answer (and prompt as a fallback) so the strip shows only what's needed.
function relevantTables(q) {
  const text = (q.answer + ' ' + q.prompt).toLowerCase();
  const hits = SEED_SCHEMA.filter(t => text.includes(t.table.toLowerCase()));
  return hits.length ? hits : SEED_SCHEMA;
}

// Compact schema strip: one line per relevant table — no tree to manage.
function schemaStripHtml(q) {
  return `<div class="schemastrip">${relevantTables(q).map(t =>
    `<div>▦ <span class="sstable">${esc(t.table)}</span> <span class="dim">(</span><span class="sscols">${t.columns.map(c => esc(c.name)).join(', ')}</span><span class="dim">)</span></div>`).join('')}
  </div>`;
}

// After a statement runs, fold any new tables into autocomplete.
function refreshExplorer(schema) {
  if (!schema || !editor) return;
  const hints = {};
  for (const t of schema) hints[t.table] = t.columns.map(c => c.name);
  editor.setOption('hintOptions', { tables: hints, completeSingle: false });
}

// Mount a CodeMirror SQL editor with schema-aware autocomplete.
function mountEditor(hostId) {
  const host = document.getElementById(hostId);
  editor = CodeMirror(host, {
    mode: 'text/x-sql',
    theme: 'trail',
    lineNumbers: true,
    lineWrapping: true,          // long queries wrap — no ugly native h-scrollbar
    scrollbarStyle: 'null',
    matchBrackets: true,
    autoCloseBrackets: true,
    autofocus: true,
    viewportMargin: Infinity,
    extraKeys: {
      'Ctrl-Space': 'autocomplete',
      'Ctrl-Enter': () => submitAnswer(),
      'Cmd-Enter': () => submitAnswer(),
    },
    hintOptions: { tables: SCHEMA_HINTS, completeSingle: false },
  });
  // Auto-open completions while typing identifiers or after a dot,
  // like a desktop SQL editor's IntelliSense.
  editor.on('inputRead', (cm, change) => {
    if (cm.state.completionActive) return;
    const ch = change.text[change.text.length - 1];
    if (/[A-Za-z_.]/.test(ch)) cm.showHint({ completeSingle: false });
  });
}

const HIST_KEY = 'sql-trail-history-v1';

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 3200);
}

function statbar() {
  const br = E.burnRate(run);
  const face = run.morale >= 70 ? '😄' : run.morale >= 40 ? '😐' : '😟';
  return `<div class="panel statbar">
    <span>📅 Day <b>${run.day}</b></span>
    <span>🌾 <b>${run.food}</b> lbs</span>
    <span>🔧 <b>${run.parts}</b></span>
    <span>💊 <b>${run.medicine}</b></span>
    <span>💰 $<b>${run.money}</b></span>
    <span>${face} <b>${run.morale}</b></span>
    <span class="dim">Food lasts ~${br.legsOfFood} legs</span>
    <span style="flex-basis:100%;height:0"></span>
    ${run.party.map(m =>
      m.alive ? `<span class="dim">${esc(m.name)} ❤️<b class="amber">${m.health}</b></span>`
              : `<span class="red">${esc(m.name)} ✝</span>`).join('')}
  </div>`;
}

function trailMap() {
  let line = '', labels = '';
  C.STOPS.forEach((s, i) => {
    const here = run && run.stop === i + 1;
    const passed = run && run.stop > i + 1;
    line += (passed ? '══' : '──') + (here ? '[◆]' : passed ? '[■]' : '[ ]');
  });
  return `<div class="panel crt trailmap">START ${line}══► OREGON\n<span class="dim">stop ${run ? Math.min(run.stop, 9) : 0} of 9 — ${run && run.stop >= 1 && run.stop <= 9 ? esc(C.STOPS[run.stop - 1].name) : 'the outfitter'}</span></div>`;
}

// ---------- screens ----------

function screenTitle() {
  app.innerHTML = `
    <h1 class="center">S Q L &nbsp; T R A I L</h1>
    <div class="panel crt center">
      <p style="margin:4px 0">You have died of a Cartesian product.<br><span class="dim">…not yet, anyway.</span></p>
    </div>
    <div class="panel">
      <p>Travel the trail. At every rest stop, interview-grade SQL decides whether your party eats.</p>
      <p class="dim">v${C.GAME_VERSION} build ${BUILD} — fixed trail, fixed questions, seeded events. Beat your own last run.</p>
    </div>
    <div class="center">
      <button class="primary" onclick="screenOutfit()">Head west ▸</button>
      <button onclick="screenHistory()">Journey records</button>
    </div>`;
}

function screenOutfit() {
  app.innerHTML = `
    <h2>Independence, MO — The Outfitter</h2>
    <div class="panel">
      <p>Name your party of four.</p>
      <div class="row">
        <div><label>Leader</label><input type="text" id="p0" value="You" maxlength="12"></div>
        <div><label>Member 2</label><input type="text" id="p1" value="Ada" maxlength="12"></div>
        <div><label>Member 3</label><input type="text" id="p2" value="Edgar" maxlength="12"></div>
        <div><label>Member 4</label><input type="text" id="p3" value="Codd" maxlength="12"></div>
      </div>
    </div>
    <div class="panel">
      <p>You have <b class="amber">$${E.START.money}</b>. Allocate your budget — an analyst plans from data.
      <span class="dim">(Food $${E.PRICES.food}/lb · Parts $${E.PRICES.parts} each · Medicine $${E.PRICES.medicine} each. Unspent money stays cash for hints and forts.)</span></p>
      <div class="row">
        <div><label>$ Food</label><input type="number" id="aFood" value="100" min="0" max="160"></div>
        <div><label>$ Parts</label><input type="number" id="aParts" value="40" min="0" max="160"></div>
        <div><label>$ Medicine</label><input type="number" id="aMeds" value="12" min="0" max="160"></div>
      </div>
      <p id="allocSum" class="dim"></p>
    </div>
    <p class="nextstep center">Name the party, split the budget, then hitch up — the trail starts at stop 1 of 9.</p>
    <div class="center"><button class="primary" onclick="startRun()">Hitch the oxen ▸</button></div>`;
  const upd = () => {
    const s = ['aFood','aParts','aMeds'].reduce((t, id) => t + (+document.getElementById(id).value || 0), 0);
    const el = document.getElementById('allocSum');
    el.textContent = `Spending $${s} of $${E.START.money} — $${E.START.money - s} kept as cash`;
    el.className = s > E.START.money ? 'red' : 'dim';
  };
  ['aFood','aParts','aMeds'].forEach(id => document.getElementById(id).oninput = upd);
  upd();
}

function startRun() {
  const names = [0,1,2,3].map(i => document.getElementById('p' + i).value.trim() || 'Pioneer');
  const alloc = {
    food: +document.getElementById('aFood').value || 0,
    parts: +document.getElementById('aParts').value || 0,
    medicine: +document.getElementById('aMeds').value || 0,
  };
  try { run = E.newRun(C, names, alloc); }
  catch (e) { toast(e.message); return; }
  run.startedAt = Date.now();
  screenTravel();
}

function screenTravel() {
  const next = C.STOPS[run.stop]; // stop index === next stop (0-based)
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>On the trail — toward ${esc(next.name)}</h2>
    <div class="panel">
      <div class="row">
        <div><label>Pace</label>${sel('pace', Object.keys(E.PACE), run.pace)}</div>
        <div><label>Rations</label>${sel('rations', Object.keys(E.RATIONS), run.rations)}</div>
      </div>
    </div>
    <p class="nextstep center">Pick a pace and rations (they trade speed against food and health), then roll on toward ${esc(next.name)}.</p>
    <div class="center"><button class="primary" onclick="doTravel()">Continue on trail ▸</button></div>
    ${logPanel()}`;
  function sel(key, opts, cur) {
    return opts.map(o =>
      `<button style="min-width:110px;${o===cur?'background:var(--fg);color:var(--bg);text-shadow:none;':''}" onclick="run.${key}='${o}';screenTravel()">${o}</button>`).join('');
  }
}

function logPanel() {
  if (!run.log.length) return '';
  return `<div class="panel"><b class="amber">Trail log</b>${run.log.slice(-6).map(l =>
    `<div class="dim">Day ${l.day}: ${esc(l.text)}</div>`).join('')}</div>`;
}

function doTravel() {
  const pre = { day: run.day, food: run.food, logLen: run.log.length };
  E.travelLeg(run);
  screenTravelAnim(pre);
}

function afterTravel() {
  if (run.dead) return screenTombstone();
  if (run.stop > 4) return screenReport(true); // gray-box ends after stop 4 (Batch 2)
  if (C.RIVERS[run.stop]) return screenRiver();
  screenArrival();
}

// River crossing decision (Batch 1): ford, caulk, or pay the ferry.
function screenRiver() {
  const river = C.RIVERS[run.stop];
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>🌊 The ${esc(river.name)}</h2>
    <div class="panel">
      <div class="crt"><pre style="margin:0">  ～～～～～～～～～～～～～～\n ～～～ 🛶 ～～～～～ 🌊 ～～\n  ～～～～～～～～～～～～～～</pre></div>
      <div class="objective"><span class="tag">Decision</span>The river blocks the trail. Pick one way across — outcomes repeat every run, so what you learn here you can plan around.</div>
      <button onclick="doCross('ford')">Ford it (free, risky)</button>
      <button onclick="doCross('caulk')">Caulk &amp; float (free, safer)</button>
      <button onclick="doCross('ferry')" ${run.money < river.ferry ? 'disabled' : ''}>Ferry ($${river.ferry}, safe)</button>
      <div id="riverOut"></div>
    </div>`;
}
function doCross(choice) {
  const river = C.RIVERS[run.stop];
  const r = E.crossRiver(run, run.stop, choice, river);
  if (!r.ok) { toast(r.text); return; }
  document.getElementById('riverOut').innerHTML = `
    <p class="amber">${esc(r.text)}</p>
    <button onclick="run.dead ? screenTombstone() : screenArrival()">Continue</button>`;
  [...document.querySelectorAll('button')].forEach(b => { if (b.textContent.match(/Ford|Caulk|Ferry/)) b.disabled = true; });
}

// Landmark arrival vignette (Batch 1).
function screenArrival() {
  const stop = C.STOPS[run.stop - 1];
  const v = C.VIGNETTES[stop.id] || { art: '', flavor: '' };
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>You have arrived at ${esc(stop.name)}</h2>
    <div class="panel crt center">
      <pre style="margin:0;font-size:1.3em;line-height:1.3">${v.art}</pre>
      <p class="dim">${esc(v.flavor)}</p>
    </div>
    <p class="nextstep center">Next: ${stop.questions.length || 5} ${esc(stop.concept)} questions. Full-credit answers feed the party.</p>
    <div class="center"><button class="primary" onclick="startStop()">Enter the ${esc(stop.theme.toLowerCase())} challenge ▸</button></div>`;
}

// The classic OT travel screen: wagon rolls across the landscape while the
// day/miles/food readout ticks toward the (already-computed) leg result.
// Purely cosmetic — determinism untouched. Skippable.
let animTimer = null;
function screenTravelAnim(pre) {
  const TICKS = 34, MS = 85, LANE = 44;
  const days = run.day - pre.day, food = run.food - pre.food;
  const dest = C.STOPS[Math.min(run.stop, 9) - 1];
  let t = 0;

  app.innerHTML = `
    ${trailMap()}
    <h2>On the trail — toward ${esc(dest.name)}</h2>
    <div class="panel crt">
      <pre id="scene" style="margin:0;line-height:1.15;font-size:.85em;overflow:hidden"></pre>
      <div class="statbar" style="margin-top:6px">
        <span>📅 Day <b id="animDay">${pre.day}</b></span>
        <span>🌾 <b id="animFood">${pre.food}</b> lbs</span>
        <span class="dim">${esc(run.pace)} pace · ${esc(run.rations)} rations</span>
      </div>
    </div>
    <div class="center"><button onclick="finishTravelAnim()">Skip ▸▸</button></div>
    <div id="animLog"></div>`;

  const draw = () => {
    const x = Math.round((t / TICKS) * (LANE - 12));
    const pad = ' '.repeat(x);
    const wheel = t % 2 ? 'o' : '*';
    const cloud = ' '.repeat((x * 2) % 30) + '~~~';
    document.getElementById('scene').textContent =
`  ${cloud}
        /\\      /\\/\\        ${t % 4 < 2 ? '🌤' : '  '}
   /\\  /  \\/\\  /    \\  /\\
__/  \\/      \\/      \\/  \\____________________________
${pad}   ____
${pad}  /SQL \\\\__
${pad} | TRAIL  |=🐂🐂
${pad}  ${wheel}------${wheel}
${'ⁿ'.repeat(LANE + 8)}`;
    document.getElementById('animDay').textContent = pre.day + Math.round(days * t / TICKS);
    document.getElementById('animFood').textContent = pre.food + Math.round(food * t / TICKS);
  };
  draw();
  animTimer = setInterval(() => {
    t++;
    if (t >= TICKS) return finishTravelAnim();
    draw();
  }, MS);

  window.finishTravelAnim = () => {
    clearInterval(animTimer);
    document.getElementById('animDay').textContent = run.day;
    document.getElementById('animFood').textContent = run.food;
    const fresh = run.log.slice(pre.logLen);
    document.getElementById('animLog').innerHTML = `
      ${fresh.length ? `<div class="panel">${fresh.map(l => `<div class="amber">Day ${l.day}: ${esc(l.text)}</div>`).join('')}</div>` : ''}
      <div class="center"><button onclick="afterTravel()">Continue</button></div>`;
    document.querySelector('button[onclick="finishTravelAnim()"]')?.remove();
  };
}

function startStop() {
  qState = { idx: 0, attempts: 0, hintsShown: 0, startedAt: Date.now(), correctCount: 0 };
  buildTokens = [];
  screenQuestion();
}

function screenQuestion() {
  const stop = C.STOPS[run.stop - 1];
  const q = stop.questions[qState.idx];
  // Hints 1-2 are nudges; hint 3 is the full answer, ready to copy or paste.
  const hints = q.hints.slice(0, Math.min(qState.hintsShown, 2)).map((h, i) =>
    `<div class="dim">Hint ${i + 1}: ${esc(h)}</div>`).join('')
    + (qState.hintsShown >= 3 ? `
      <div class="dim">Hint 3 — the full answer:</div>
      <div style="border:1px solid var(--dim);background:#0d0d0b;padding:8px;font-family:Consolas,monospace;text-shadow:none;color:#d4d4d4">${esc(q.answer)}</div>
      <button style="min-height:34px;padding:4px 12px" onclick="copyAnswer()">Copy</button>
      <button style="min-height:34px;padding:4px 12px" onclick="pasteAnswer()">Paste into editor</button>` : '');
  const nextHintCost = E.hintCost(qState.hintsShown);
  app.innerHTML = `
    ${trailMap()}${statbar()}
    <h2>${esc(stop.name)} — ${esc(stop.concept)}</h2>
    ${qState.idx === 0 && stop.intro ? `<p class="dim">${esc(stop.intro)}</p>` : ''}
    <div class="panel">
      <b>Question ${qState.idx + 1} of ${stop.questions.length}</b>
      <span class="qdots">${stop.questions.map((_, i) =>
        `<i class="${i < qState.idx ? 'done' : i === qState.idx ? 'now' : ''}"></i>`).join('')}</span>
      <div class="objective"><span class="tag">🎯 Your task</span>${esc(q.prompt)}</div>
      ${hints}
      <div class="modetabs">
        <button class="${inputMode === 'type' ? 'on' : ''}" onclick="setInputMode('type')">⌨ Type</button>
        <button class="${inputMode === 'build' ? 'on' : ''}" onclick="setInputMode('build')">👆 Build</button>
      </div>
      ${inputMode === 'type'
        ? '<label class="dim" style="font-size:.85em">Ctrl+Space = autocomplete · Ctrl+Enter = run</label>'
        : '<label class="dim" style="font-size:.85em">Tap tokens to build the query — it assembles in the editor above the pad</label>'}
      <div id="sqlHost"></div>
      ${inputMode === 'build' ? builderHtml(q) : ''}
      ${schemaStripHtml(q)}
      <div>
        <button class="primary" onclick="submitAnswer()">▶ Execute</button>
        <button onclick="takeHint()" ${qState.hintsShown >= 3 ? 'disabled' : ''}>
          ${qState.hintsShown >= 2 ? 'Show answer' : `Hint ${qState.hintsShown + 1}`}${nextHintCost ? ` (−${nextHintCost} lbs food)` : ' (free)'}
        </button>
        <button onclick="skipQuestion()">Give up (−health)</button>
      </div>
      <div id="result"></div>
    </div>
    <div class="panel dim"><b class="amber">Trail Guide</b> — ${esc(guideBlurb(stop.concept))}
      <div>Study more: <a style="color:var(--amber)" href="https://michaelnocito.github.io/analyst-prep-kit/" target="_blank" rel="noopener">Analyst Prep Kit</a></div></div>`;
  mountEditor('sqlHost');
  if (inputMode === 'build' && buildTokens.length) editor.setValue(TrailBuilder.assemble(buildTokens));
}

// ---------- tap-token builder (Batch 2) ----------
// Build mode assembles tokens into the SAME CodeMirror editor, so Execute,
// grading, hints, and rewards are identical either way. Mobile-first: coarse
// pointers default to Build; the choice is remembered.
let inputMode = localStorage.getItem('sql-trail-input-v1')
  || (matchMedia('(pointer: coarse)').matches ? 'build' : 'type');
let buildTokens = [];   // tapped tokens for the current question
let PAD_FLAT = [];      // index → token text, so onclick never fights quoting

function setInputMode(m) {
  if (m === inputMode) return;
  inputMode = m;
  localStorage.setItem('sql-trail-input-v1', m);
  const keep = editor ? editor.getValue() : '';
  screenQuestion();
  if (m === 'type' && keep && editor) editor.setValue(keep);
}

function builderHtml(q) {
  const pad = TrailBuilder.padFor(q, relevantTables(q));
  PAD_FLAT = [];
  const group = (label, toks, cls) => {
    if (!toks.length) return '';
    return `<div class="bgroup"><span class="blabel">${label}</span><br>${toks.map(t => {
      const k = PAD_FLAT.push(t) - 1;
      return `<button class="tok ${cls}" onclick="tapToken(${k})">${esc(t)}</button>`;
    }).join('')}</div>`;
  };
  return `<div class="buildpad">
    ${group('keywords', pad.keywords, 'kw')}
    ${group('functions', pad.funcs, 'fn')}
    ${group('tables', pad.tables, 'tb')}
    ${group('columns', pad.columns, 'col')}
    ${group('values', pad.values, 'val')}
    ${group('operators', pad.ops, 'op')}
    <div class="bgroup">
      <button class="tok ctl" onclick="tapUndo()">⌫ Undo</button>
      <button class="tok ctl" onclick="tapClear()">Clear</button>
    </div>
  </div>`;
}

function syncBuild() {
  if (editor) editor.setValue(TrailBuilder.assemble(buildTokens));
}
function tapToken(k) { buildTokens.push(PAD_FLAT[k]); syncBuild(); }
function tapUndo() { buildTokens.pop(); syncBuild(); }
function tapClear() { buildTokens = []; syncBuild(); }

function guideBlurb(concept) {
  const g = {
    'SELECT fundamentals': 'SELECT chooses columns; DISTINCT removes duplicates; you can compute new columns with arithmetic and AS.',
    'WHERE / ORDER BY': 'WHERE filters rows (=, <, >, AND, IN); ORDER BY sorts the result, ASC or DESC.',
    'Aggregates + GROUP BY / HAVING': 'COUNT/SUM/AVG collapse many rows into one; GROUP BY makes one row per group; HAVING filters the groups.',
    'JOINs': 'JOIN matches rows across tables where the ON condition holds; LEFT JOIN keeps every left row and fills NULL when nothing matches. Qualify shared column names (table.column).',
  };
  return g[concept] || concept;
}

function currentAnswer() {
  return C.STOPS[run.stop - 1].questions[qState.idx].answer;
}
function copyAnswer() {
  navigator.clipboard.writeText(currentAnswer())
    .then(() => toast('Answer copied.'))
    .catch(() => toast('Copy blocked — use Paste into editor instead.'));
}
function pasteAnswer() {
  if (editor) { editor.setValue(currentAnswer()); editor.focus(); }
}

function takeHint() {
  const cost = E.hintCost(qState.hintsShown);
  if (cost > 0 && run.food < cost) return toast('Not enough food for that hint.');
  run.food -= cost;
  qState.hintsShown++;
  screenQuestion();
}

function submitAnswer() {
  const stop = C.STOPS[run.stop - 1];
  const q = stop.questions[qState.idx];
  const sqlText = editor ? editor.getValue() : '';
  qState.attempts++;
  const t0 = performance.now();
  const r = G.grade(SQL, C.SEED_SQL, q, sqlText);
  const execMs = Math.max(1, Math.round(performance.now() - t0));
  const out = document.getElementById('result');
  refreshExplorer(r.schemaAfter);

  if (r.tier === 'fail' && (r.reason === 'rejected' || r.reason === 'sql-error')) {
    // Free retry on syntax/sandbox errors — the trail punishes wrong answers, not typos.
    out.innerHTML = queryOutput(r, q, execMs, null);
    return;
  }

  const timeMs = Date.now() - qState.startedAt;
  if (r.tier === 'full' || r.tier === 'partial') {
    const reward = E.recordAnswer(run, stop.id, r, qState.attempts, qState.hintsShown, timeMs);
    if (r.tier === 'full') qState.correctCount++;
    out.innerHTML = `
      ${queryOutput(r, q, execMs, null)}
      ${r.tier === 'full'
        ? `<p class="amber">Correct. You gathered ${reward} lbs of supplies.</p>`
        : `<p class="amber">Partial credit (${Math.round(r.overlap * 100)}% of rows). You gathered ${reward} lbs but could only carry half.</p>`}
      <button onclick="nextQuestion()">Continue</button>`;
  } else {
    E.recordAnswer(run, stop.id, r, qState.attempts, qState.hintsShown, timeMs);
    out.innerHTML = `
      ${queryOutput(r, q, execMs, null)}
      <p class="red">The query ran, but the rows are wrong. The party goes a little hungrier.</p>
      <button onclick="screenQuestion()">Try again</button>
      <button onclick="nextQuestion()">Move on</button>`;
  }
  if (run.dead) screenTombstone();
}

// Real-world query editor output: Results grid + Messages tab.
function queryOutput(r, q, execMs) {
  const isWrite = q.type === 'write';
  const messages = [];
  if (r.reason === 'rejected' || r.reason === 'sql-error') {
    messages.push(`<div class="msgline err">Error: ${esc(r.error || 'query failed')}</div>`);
  } else if (isWrite) {
    messages.push(r.rowsAffected > 0
      ? `<div class="msgline">(${r.rowsAffected} row${r.rowsAffected === 1 ? '' : 's'} affected)</div>`
      : `<div class="msgline">Commands completed successfully.</div>`);
    messages.push(`<div class="msgline">Completion time: ${execMs} ms</div>`);
  } else {
    const n = r.playerRes ? r.playerRes.values.length : 0;
    messages.push(`<div class="msgline">(${n} row${n === 1 ? '' : 's'} returned in ${execMs} ms)</div>`);
  }
  const hasGrid = r.playerRes && r.playerRes.columns.length;
  const gridLabel = isWrite && hasGrid ? '<div class="dim" style="margin-bottom:4px">Table state after your statement:</div>' : '';
  const results = hasGrid ? gridLabel + renderRows(r.playerRes) : '<div class="msgline dim">No result set.</div>';
  const startTab = (r.reason === 'rejected' || r.reason === 'sql-error') ? 'msg' : 'res';
  const uid = 'out' + Date.now();
  return `
    <div class="outtabs">
      <button id="${uid}-tres" class="${startTab === 'res' ? 'on' : ''}" onclick="showOutTab('${uid}','res')">Results</button>
      <button id="${uid}-tmsg" class="${startTab === 'msg' ? 'on' : ''}" onclick="showOutTab('${uid}','msg')">Messages</button>
    </div>
    <div id="${uid}-res" class="outpane" style="display:${startTab === 'res' ? 'block' : 'none'}">${results}</div>
    <div id="${uid}-msg" class="outpane" style="display:${startTab === 'msg' ? 'block' : 'none'}">${messages.join('')}</div>`;
}

function showOutTab(uid, tab) {
  for (const t of ['res', 'msg']) {
    document.getElementById(`${uid}-${t}`).style.display = t === tab ? 'block' : 'none';
    document.getElementById(`${uid}-t${t}`).classList.toggle('on', t === tab);
  }
}

function skipQuestion() {
  const stop = C.STOPS[run.stop - 1];
  E.recordAnswer(run, stop.id, { tier: 'fail' }, qState.attempts + 1, qState.hintsShown, Date.now() - qState.startedAt);
  run.party.forEach(m => { if (m.alive) m.health -= 5; });
  nextQuestion();
}

function renderRows(res) {
  if (!res || !res.columns.length) return '<p class="dim">(no rows returned)</p>';
  const head = '<tr><th class="dim">#</th>' + res.columns.map(c => `<th>${esc(c)}</th>`).join('') + '</tr>';
  const body = res.values.slice(0, 50).map((r, i) =>
    `<tr><td class="dim gridnum">${i + 1}</td>` + r.map(v =>
      v === null ? '<td><span class="dim">NULL</span></td>'
      : typeof v === 'number' ? `<td class="gridnum">${esc(v)}</td>`
      : `<td>${C.ITEM_ICONS[v] ? C.ITEM_ICONS[v] + ' ' : ''}${esc(v)}</td>`).join('') + '</tr>').join('');
  const more = res.values.length > 50 ? `<p class="dim">…${res.values.length - 50} more rows</p>` : '';
  return `<table>${head}${body}</table>${more}`;
}

function nextQuestion() {
  const stop = C.STOPS[run.stop - 1];
  qState.idx++;
  if (qState.idx >= stop.questions.length) {
    // Stop failure = under half full-credit answers (GDD §5: move on weakened).
    if (qState.correctCount < Math.ceil(stop.questions.length / 2)) {
      E.failStop(run);
      toast('A rough stop. The party moves on weakened.');
    }
    if (run.dead) return screenTombstone();
    screenTravel();
  } else {
    qState.attempts = 0; qState.hintsShown = 0; qState.startedAt = Date.now();
    buildTokens = [];
    screenQuestion();
  }
}

function screenTombstone() {
  const rand = TrailRNG.fromVersion(C.GAME_VERSION + ':' + run.day);
  const epitaph = C.EPITAPHS[Math.floor(rand() * C.EPITAPHS.length)];
  saveHistory(false);
  app.innerHTML = `
    <h2 class="center red">The whole party has died.</h2>
    <div class="panel crt tomb center">      _______
     /       \\
    |  R.I.P  |
    |         |
    | ${esc(run.party[0].name).padEnd(8)}|
    |  &amp; co.  |
    |_________|
   Here lies a party that
   ${esc(epitaph)}
   Day ${run.day} · v${C.GAME_VERSION}</div>
    <div class="center">
      <button onclick="screenOutfit()">Start a new run</button>
      <button onclick="screenReport(false)">Journey Report</button>
    </div>`;
}

function screenReport(finished) {
  const m = run.metrics;
  // Arrival-condition bonus (Batch 1): applied once, shown as a breakdown.
  if (finished && !m.arrival) {
    m.arrival = E.arrivalBonus(run);
    m.score += m.arrival.total;
  }
  if (finished) saveHistory(true);
  const mins = Math.round((Date.now() - run.startedAt) / 6000) / 10;
  const rows = m.perStop.map(s => {
    const stop = C.STOPS[s.stop - 1];
    return `<tr><td>${s.stop}. ${esc(stop.name)}</td><td>${esc(stop.concept)}</td>
      <td>${s.correct}/${stop.questions.length}</td><td>${s.partial}</td><td>${s.hints}</td>
      <td>${Math.round(s.timeMs / 1000)}s</td></tr>`;
  }).join('');
  const hist = loadHistory();
  const prev = hist.length > 1 ? hist[hist.length - 2] : null;
  app.innerHTML = `
    <h2>${finished ? 'Gray-box complete — Journey Report' : 'Journey Report'}</h2>
    <div class="panel">
      <div class="statbar">
        <span>Time <b>${mins}</b> min</span><span>Days <b>${run.day}</b></span>
        <span>Score <b>${m.score}</b></span><span>Hints <b>${m.hints}</b></span>
        <span>Deaths <b>${m.deaths}</b></span>
      </div>
      <table><tr><th>Stop</th><th>Concept</th><th>Full</th><th>Partial</th><th>Hints</th><th>Time</th></tr>${rows}</table>
      ${m.arrival ? `<p class="amber">Arrival bonus: +${m.arrival.total}</p><div class="dim">${m.arrival.parts.map(p => `${esc(p.label)} +${p.value}`).join(' · ')}</div>` : ''}
      ${prev ? `<p class="dim">Last run: score ${prev.score}, ${prev.mins} min — ${m.score > prev.score ? '<span class="amber">you beat it.</span>' : 'beat it next time.'}</p>` : '<p class="dim">First recorded run. This is your baseline.</p>'}
      <p class="dim">The gray-box currently covers stops 1-4. Stops 5-9 and the full Journey Report land in later batches.</p>
    </div>
    <div class="center">
      <button class="primary" onclick="screenOutfit()">Run it again ▸</button>
      <button onclick="screenTitle()">Title</button>
    </div>`;
}

function saveHistory(finished) {
  const hist = loadHistory();
  hist.push({ v: run.version, score: run.metrics.score, days: run.day,
    mins: Math.round((Date.now() - run.startedAt) / 6000) / 10,
    hints: run.metrics.hints, deaths: run.metrics.deaths, finished, at: Date.now() });
  localStorage.setItem(HIST_KEY, JSON.stringify(hist.slice(-50)));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; }
}

function screenHistory() {
  const hist = loadHistory().slice().reverse();
  app.innerHTML = `
    <h2>Journey records</h2>
    <div class="panel">${hist.length ? `<table>
      <tr><th>When</th><th>Score</th><th>Days</th><th>Min</th><th>Hints</th><th>Fate</th></tr>
      ${hist.map(h => `<tr><td>${new Date(h.at).toLocaleDateString()}</td><td>${h.score}</td>
        <td>${h.days}</td><td>${h.mins}</td><td>${h.hints}</td>
        <td>${h.finished ? 'arrived' : '<span class="red">✝</span>'}</td></tr>`).join('')}
      </table>` : '<p class="dim">No runs yet. The trail keeps the books; you just have to walk it.</p>'}
    </div>
    <div class="center"><button onclick="screenTitle()">Back</button></div>`;
}

// ---------- boot ----------
(async () => {
  checkForUpdate();
  setInterval(checkForUpdate, 120000); // catch long-open tabs too
  SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
  buildSchemaHints();
  screenTitle();
})();
</script>
</body>
